<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор собівартості</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .input-style {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 12px 16px;
        width: 100%;
        transition: 0.2s;
        color: white;
        text-align: center;
        font-weight: 600;
      }
      .input-style:focus {
        border-color: #3b82f6;
        outline: none;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }
      .label-sub {
        display: block;
        text-align: center;
        font-size: 10px;
        font-weight: 800;
        color: #64748b;
        text-transform: uppercase;
        margin-top: 6px;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body class="min-h-screen p-4 md:p-8 flex items-center justify-center">
    <div class="max-w-4xl w-full">
      <header class="mb-8 text-center">
        <h1 class="text-3xl font-black tracking-tight text-white uppercase">
          Собівартість
          <span
            class="text-blue-500 font-extrabold underline decoration-blue-500/30"
            >3D-друку</span
          >
        </h1>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-6">
          <div
            class="glass-card rounded-3xl p-6 shadow-xl border border-white/5"
          >
            <h2
              class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-6 flex items-center gap-2"
            >
              <span
                class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"
              ></span>
              Параметри Принтера
            </h2>
            <div class="space-y-6">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <select id="brandSel" class="input-style text-xs"></select>
                  <span class="label-sub">Виберіть Бренд</span>
                </div>
                <div>
                  <select id="modelSel" class="input-style text-xs"></select>
                  <span class="label-sub">Модель</span>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div>
                  <input type="number" id="power" class="input-style text-sm" />
                  <span class="label-sub">Потужінсть (W)</span>
                </div>
                <div>
                  <input type="number" id="depr" class="input-style text-sm" />
                  <span class="label-sub">Аморт (₴/год)</span>
                </div>
                <div>
                  <input
                    type="number"
                    id="rate"
                    step="0.01"
                    class="input-style text-sm"
                  />
                  <span class="label-sub">Тариф (кВт)</span>
                </div>
              </div>
            </div>
          </div>

          <div
            class="glass-card rounded-3xl p-6 shadow-xl border border-white/5"
          >
            <h2
              class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-6"
            >
              Витратні матеріали
            </h2>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <input type="number" id="pPrice" class="input-style text-lg" />
                <span class="label-sub">Ціна за 1 кг</span>
              </div>
              <div>
                <input type="number" id="mWeight" class="input-style text-lg" />
                <span class="label-sub">Вага деталі (г)</span>
              </div>
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <div
            class="glass-card rounded-3xl p-6 shadow-xl flex flex-col justify-between h-full border border-blue-500/10"
          >
            <div class="mb-6">
              <h2
                class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-4 text-center"
              >
                Тривалість друку
              </h2>
              <input
                type="text"
                id="timeInput"
                value="00:54:00"
                class="input-style text-5xl font-black text-blue-400 tracking-widest py-4 border-2 border-blue-500/20"
              />
              <span class="label-sub mt-2 opacity-60"
                >ГОДИНИ : ХВИЛИНИ : СЕКУНДИ</span
              >
            </div>

            <div
              class="bg-blue-600/10 border border-blue-500/40 rounded-[2rem] p-8 text-center shadow-inner mb-6"
            >
              <span
                class="block text-[10px] font-black text-blue-300 uppercase mb-2 tracking-[0.2em]"
                >Фінальна Собівартість</span
              >
              <div class="text-7xl font-black text-white">
                <span id="resNet">0.00</span>
                <span class="text-3xl text-blue-500">₴</span>
              </div>
            </div>

            <div class="space-y-3 px-4">
              <div
                class="flex justify-between text-xs font-bold border-b border-white/5 pb-2"
              >
                <span class="text-slate-500 uppercase">Пластик:</span>
                <span id="subMat" class="text-white">0.00 ₴</span>
              </div>
              <div
                class="flex justify-between text-xs font-bold border-b border-white/5 pb-2"
              >
                <span class="text-slate-500 uppercase">Електроенергія:</span>
                <span id="subEnergy" class="text-white">0.00 ₴</span>
              </div>
              <div class="flex justify-between text-xs font-bold">
                <span class="text-slate-500 uppercase">Амортизація:</span>
                <span id="subDepr" class="text-white">0.00 ₴</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const printerDatabase = {
        ELEGOO: [
          "Neptune 2",
          "Neptune 2D",
          "Neptune 2S",
          "Neptune 3",
          "Neptune 3 Pro",
          "Neptune 3 Plus",
          "Neptune 3 Max",
          "Neptune 4",
          "Neptune 4 Pro",
          "Neptune 4 Plus",
          "Neptune 4 Max",
          "Neptune 5",
        ],
        CREALITY: [
          "Ender 2 Pro",
          "Ender 3",
          "Ender 3 Pro",
          "Ender 3 V2",
          "Ender 3 V2 Neo",
          "Ender 3 Neo",
          "Ender 3 S1",
          "Ender 3 S1 Pro",
          "Ender 3 S1 Plus",
          "Ender 3 V3 SE",
          "Ender 3 V3 KE",
          "Ender 3 V3",
          "Ender 3 Max",
          "Ender 3 Hi",
          "CR-6 SE",
          "CR-10 SE",
          "K1",
          "K1 Max",
          "K1C",
          "K2 Plus",
          "K2 Pro",
          "K2 Standard",
          "K2 Max AI",
          "Sermoon S1",
        ],
        ANYCUBIC: [
          "Kobra",
          "Kobra 2",
          "Kobra 2 Neo",
          "Kobra 2 Pro",
          "Kobra 2 Max",
          "Kobra 3",
          "Mega S",
          "Mega X",
          "Vyper",
          "Photon Mono",
          "Photon Mono X",
          "Photon Mono X2",
          "Photon M3",
          "Photon M5",
        ],
        "BAMBU LAB": ["X1", "X1 Carbon", "X1E", "P1P", "P1S", "A1", "A1 Mini"],
        PRUSA: [
          "Original Prusa i3 MK3S+",
          "Original Prusa MK4",
          "Prusa MINI+",
          "Prusa XL",
          "Prusa CORE One",
        ],
        FLASHFORGE: [
          "Adventurer 3",
          "Adventurer 4",
          "Adventurer 5M",
          "Adventurer 5M Pro",
          "Creator Pro",
          "Creator Pro 2",
          "Creator 3",
          "Guider 2",
          "Guider 3",
        ],
        "QIDI TECH": [
          "X-Plus",
          "X-Max",
          "X-Smart",
          "X-Plus 3",
          "X-Max 3",
          "Q1 Pro",
        ],
        FLSUN: [
          "FLSUN QQ-S",
          "FLSUN SR",
          "FLSUN Super Racer",
          "FLSUN V400",
          "FLSUN S1",
        ],
        SOVOL: [
          "SV01",
          "SV03",
          "SV04",
          "SV06",
          "SV06 Plus",
          "SV07",
          "SV07 Plus",
        ],
        ANKERMAKE: ["M5", "M5C"],
        SNAPMAKER: ["Snapmaker Original", "Snapmaker Artisan"],
        RAISE3D: ["E2", "E2CF", "Pro2", "Pro2 Plus", "RMF500"],
        ULTIMAKER: [
          "Ultimaker 2+",
          "Ultimaker S3",
          "Ultimaker S5",
          "Ultimaker S7",
        ],
        MODIX: ["BIG-60", "BIG-120X"],
        MARKFORGED: ["Onyx One", "Mark Two", "X7"],
        STRATASYS: ["F170", "F370", "Fortus 450mc"],
      };

      const brandSel = document.getElementById("brandSel");
      const modelSel = document.getElementById("modelSel");
      const inputs = [
        "power",
        "depr",
        "rate",
        "pPrice",
        "mWeight",
        "timeInput",
      ];

      function init() {
        Object.keys(printerDatabase).forEach((brand) =>
          brandSel.add(new Option(brand, brand)),
        );
        brandSel.addEventListener("change", populateModels);
        modelSel.addEventListener("change", updateSpecs);
        inputs.forEach((id) =>
          document.getElementById(id).addEventListener("input", calc),
        );

        const saved = localStorage.getItem("3dCost_V6_Smart");
        if (saved) {
          const data = JSON.parse(saved);
          brandSel.value = data.brand;
          populateModels();
          modelSel.value = data.model;
          inputs.forEach((id) => {
            if (data[id] !== undefined)
              document.getElementById(id).value = data[id];
          });
        } else {
          populateModels();
          document.getElementById("rate").value = 4.32;
          document.getElementById("pPrice").value = 850;
          document.getElementById("mWeight").value = 50;
        }
        calc();
      }

      function populateModels() {
        modelSel.innerHTML = "";
        printerDatabase[brandSel.value].forEach((m) =>
          modelSel.add(new Option(m, m)),
        );
        updateSpecs();
      }

      function updateSpecs() {
        const model = modelSel.value.toLowerCase();
        const brand = brandSel.value;

        // Базові значення
        let p = 200;
        let d = 5;

        // Логіка підбору характеристик
        if (
          model.includes("max") ||
          model.includes("plus") ||
          model.includes("xl") ||
          model.includes("180x") ||
          model.includes("400")
        ) {
          p = 350;
          d = 10;
        }
        if (
          model.includes("photon") ||
          model.includes("mono") ||
          model.includes("m3") ||
          model.includes("m5") ||
          model.includes("inkspire")
        ) {
          p = 60;
          d = 15; // Фотополімерники
        }
        if (
          brand === "BAMBU LAB" ||
          brand === "QIDI TECH" ||
          brand === "FLSUN"
        ) {
          p = 350;
          d = 15; // Швидкісні принтери з CoreXY/Delta
        }
        if (
          brand === "STRATASYS" ||
          brand === "MARKFORGED" ||
          brand === "RAISE3D" ||
          brand === "ULTIMAKER"
        ) {
          p = 500;
          d = 60; // Професійні та промислові
        }
        if (model.includes("k1") || model.includes("k2")) {
          p = 350;
          d = 15;
        }

        document.getElementById("power").value = p;
        document.getElementById("depr").value = d;
        calc();
      }

      function calc() {
        const v = {};
        inputs.forEach((id) => (v[id] = document.getElementById(id).value));

        // Парсинг часу HH:mm:ss
        const timeParts = v.timeInput.split(":");
        let h = parseInt(timeParts[0]) || 0;
        let m = parseInt(timeParts[1]) || 0;
        let s = parseInt(timeParts[2]) || 0;
        const totalHours = h + m / 60 + s / 3600;

        const matCost =
          (parseFloat(v.pPrice) / 1000) * parseFloat(v.mWeight) || 0;
        const nrgCost =
          (parseFloat(v.power) / 1000) * totalHours * parseFloat(v.rate) || 0;
        const dprCost = parseFloat(v.depr) * totalHours || 0;
        const net = matCost + nrgCost + dprCost;

        document.getElementById("resNet").innerText = net.toFixed(2);
        document.getElementById("subMat").innerText = matCost.toFixed(2) + " ₴";
        document.getElementById("subEnergy").innerText =
          nrgCost.toFixed(2) + " ₴";
        document.getElementById("subDepr").innerText =
          dprCost.toFixed(2) + " ₴";

        const saveObj = { brand: brandSel.value, model: modelSel.value };
        inputs.forEach((id) => (saveObj[id] = v[id]));
        localStorage.setItem("3dCost_V6_Smart", JSON.stringify(saveObj));
      }

      init();
    </script>
  </body>
</html>
